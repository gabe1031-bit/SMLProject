<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Climate Quiz | SML Weather & Climate</title>

  <style>
    body{
      margin:0;
      font-family:'Segoe UI', Arial, sans-serif;
      background:linear-gradient(to bottom right,#eaf6ff,#cfe9ff);
      color:#0b3d91;
      padding:30px;
      text-align:center;
    }

    h1{ margin-bottom:20px; }

    .card{
      max-width:700px;
      margin:auto;
      background:white;
      padding:30px;
      border-radius:14px;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
    }

    #question{
      font-size:18px;
      margin-bottom:20px;
    }

    #answers button{
      display:block;
      width:100%;
      margin:10px 0;
      padding:12px;
      font-size:15px;
      background:#0b3d91;
      color:white;
      border:none;
      border-radius:10px;
      cursor:pointer;
      transition:background 0.2s ease;
    }

    #answers button:hover{ background:#072c6b; }

    #result{
      margin-top:15px;
      font-weight:bold;
      font-size:16px;
    }

    .nextBtn{
      margin-top:20px;
      padding:10px 18px;
      background:#0b3d91;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .nextBtn:hover{ background:#072c6b; }

    .nav{ margin-top:25px; }
    .nav a{
      text-decoration:none;
      color:white;
      background:#0b3d91;
      padding:10px 18px;
      border-radius:8px;
      display:inline-block;
    }
  </style>
</head>

<body>
  <h1>?? Weather & Climate Quiz</h1>

  <div class="card">
    <p id="question">Loading...</p>
    <div id="answers"></div>
    <p id="result"></p>

    <!-- No onclick here -->
    <button id="nextBtn" class="nextBtn" type="button">Next Question</button>
  </div>

  <div class="nav">
    <a href="newtab.html">Home</a>
  </div>

  <!-- External script only (allowed) -->
  <script src="quiz.js"></script>
</body>
</html>
